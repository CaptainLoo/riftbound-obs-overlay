name: Build Windows

# Manual Windows build only — tag releases use release-installer.yml.
on:
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: riftbound-obs-windows
          path: |
            dist/riftbound-obs-windows.zip
            dist/riftbound-setup-*.exe
            dist/win/
