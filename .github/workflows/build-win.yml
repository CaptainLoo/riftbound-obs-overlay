name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-win:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - run: npm run build:win

      - uses: actions/upload-artifact@v4
        with:
          name: riftbound-obs-windows
          path: |
            dist/riftbound-obs-windows.zip
            dist/win/
