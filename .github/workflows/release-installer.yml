name: Release Installer

# Builds Electron portable zip + riftbound-setup-VERSION.exe on Windows after `npm run publish` pushes tag v*.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v0.1.5)"
        required: true

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build Electron Windows release
        run: npm run build:electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Patch update manifest with installer metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: node scripts/update-manifest-installer.mjs

      - name: Upload installer, portable zip, and manifest to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            "dist/riftbound-setup-${VERSION}.exe" \
            "dist/riftbound-obs-windows.zip" \
            "dist/update-manifest.json" \
            --repo "${{ github.repository }}" \
            --clobber
