name: Release (manual full build)

# Optional: full rebuild of all assets on Ubuntu (no .exe — use release-installer.yml for setup.exe).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Build patch
        run: npm run build:patch

      - name: Generate update manifest
        run: node scripts/generate-manifest.mjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: riftbound-release-assets
          path: |
            dist/riftbound-obs-patch-*.zip
            dist/riftbound-obs-windows.zip
            dist/update-manifest.json
