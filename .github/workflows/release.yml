name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Build Stream Deck plugin
        run: npm run build:streamdeck

      - name: Build patch
        run: npm run build:patch
        env:
          SKIP_STREAMDECK_BUILD: "1"

      - name: Build Windows portable
        run: npm run build:win
        env:
          SKIP_STREAMDECK_BUILD: "1"

      - name: Build Windows installer
        run: npm run build:installer
        continue-on-error: true

      - name: Generate update manifest
        env:
          RELEASE_VERSION: ${{ github.ref_name == '' && '0.0.0-ci' || github.ref_name }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            export RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          fi
          node scripts/generate-manifest.mjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: riftbound-release-assets
          path: |
            dist/riftbound-obs-patch-*.zip
            dist/riftbound-obs-windows.zip
            dist/riftbound-setup-*.exe
            dist/update-manifest.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ASSETS=(dist/riftbound-obs-patch-${VERSION}.zip dist/riftbound-obs-windows.zip dist/update-manifest.json)
          if [ -f "dist/riftbound-setup-${VERSION}.exe" ]; then
            ASSETS+=("dist/riftbound-setup-${VERSION}.exe")
          fi
          gh release upload "$TAG" "${ASSETS[@]}" --clobber || \
          gh release create "$TAG" "${ASSETS[@]}" --title "Riftbound OBS ${VERSION}" --notes "Release ${VERSION}"
